name: Verify spec artifacts parity

# F5 + F6 (Memo 061). This workflow used to REGENERATE dist/ and commit+push it as
# github-actions[bot]. That bot won the last write on the shared dist/ target and — because it ran
# WITHOUT the sibling ../core repo — reverted the live bridge hub to the ALT format on every source
# push (Memo 060 defect, bot commit 2f2109c).
#
# It is now a READ-ONLY parity gate:
#   * F5 — the bot no longer regenerates or commits dist/. committed-dist is the single source of
#     truth; the author maintains dist/ on commit via a local build (with ../core present → NEU).
#   * F6 — check-dist-parity.mjs asserts (blocking) that no committed dist bridge hub carries the ALT
#     format. This structural gate is core-INDEPENDENT on purpose: the sibling core repo is PRIVATE
#     and cannot be checked out here (the only repo secret has no access to it), so a full
#     ../core reference-build parity is infeasible in CI. The full reference-build parity is the
#     LOCAL / pre-push layer of check-dist-parity.mjs (Layer 2, runs when ../core is present); the CI
#     job runs Layer 1, which directly catches the exact defect (ALT hub reaching the site) without
#     core or a rebuild. Deliberately hard (exit != 0): the Memo-060 WI-027 guard only warned, which
#     was the root cause.
#
# The site deploy still fires: notify-docs-site.yml triggers on the generated-artifact push
# (`**/dist/**` + the root aggregates) made by the author (a human push triggers workflows; the
# former bot needed a PAT only because a GITHUB_TOKEN-made push does not).

on:
  push:
    branches: [main]
    paths:
      - 'memo/**'
      - 'workbench/**'
      - 'session/**'
      - 'meta-spec/**'
      - 'manifest.json'
      - 'inverted-map.json'
      - 'refs.resolved.json'
      - 'data/refs.manual.json'
      - 'data/refs.schema.json'
      - 'scripts/**'
  pull_request:
    paths:
      - 'memo/**'
      - 'workbench/**'
      - 'session/**'
      - 'meta-spec/**'
      - 'manifest.json'
      - 'inverted-map.json'
      - 'refs.resolved.json'
      - 'data/refs.manual.json'
      - 'data/refs.schema.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout spec
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Parity gate — no committed dist bridge hub may carry the ALT format (F6, blocking)
        run: node scripts/check-dist-parity.mjs
