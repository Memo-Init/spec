name: Notify docs site

# Fan-out: when the spec's generated artifacts change, tell the website
# (Memo-Init/memo-init.github.io) to rebuild via a repository_dispatch event.
#
# Memo 053 (Kap 1, Fix A.2 — race eliminieren): this fires ONLY on generated artifacts
# (`**/dist/**` and the root-level aggregates), never on the authored `**/draft/**` sources
# directly. A source edit is committed together with its regenerated dist, so exactly ONE
# site deploy runs from the POST-build state. Firing on the authored draft too caused a second,
# earlier deploy that built from the PRE-build tree (the stale "first deploy" race). The site
# build reads the rendered chapters from each family's `dist/` and the root aggregates, and every
# source edit changes a dist artifact, so a generated-only trigger still covers all content changes
# (Memo 064 flatten: per-namespace <ns>/<ver>/dist/ + root manifest/inverted-map/refs.resolved).

on:
  push:
    branches: [main]
    paths:
      - '**/dist/**'
      - 'manifest.json'
      - 'inverted-map.json'
      - 'refs.resolved.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch spec-updated
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.PUBLISH_SPEC_CHANGES }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Memo-Init/memo-init.github.io/dispatches \
            -d '{"event_type":"spec-updated"}'
