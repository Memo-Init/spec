name: Notify docs site

# Fan-out: when the spec's generated artifacts change, tell the website
# (Memo-Init/memo-init.github.io) to rebuild via a repository_dispatch event.
#
# Memo 053 (Kap 1, Fix A.2 — race eliminieren): this fires ONLY on `dist/**`,
# never on `draft/**` directly. A source push first triggers generate.yml, which
# regenerates `dist/` and commits it (with the PAT, so this workflow re-triggers);
# only that bot commit fires the notify -> exactly ONE site deploy, from the POST-regen
# state. Firing on `draft/**` too caused a second, earlier deploy that built from the
# PRE-regen tree (the stale "first deploy" race). The site build reads the rendered
# chapters from `dist/`, and every source edit changes a dist artifact, so a
# `dist/**`-only trigger still covers all content changes (Memo 058: generated/ -> dist/).

on:
  push:
    branches: [main]
    paths:
      - 'dist/**'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch spec-updated
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.PUBLISH_SPEC_CHANGES }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Memo-Init/memo-init.github.io/dispatches \
            -d '{"event_type":"spec-updated"}'
