name: Notify org profile

# Fan-out: when the resolved refs change, tell the org profile repo
# (Memo-Init/.github) to regenerate its README via a repository_dispatch event.

on:
  push:
    branches: [main]
    paths:
      - 'data/refs.manual.json'
      - 'dist/refs.resolved.json'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refs-updated
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.PUBLISH_SPEC_CHANGES }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Memo-Init/.github/dispatches \
            -d '{"event_type":"refs-updated"}'
